<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Food Archive - Full</title>
  <link rel="stylesheet" href="full.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet" />
</head>

<body>

<!-- Fixed search bar -->
<div class="search-container">
  <input type="text" id="searchBox" placeholder="Search food, restaurant... (try >rm4, <rm9, >=rm5 <=rm10)" />
  <div class="sort-dropdown">
    <div class="sort-actions">
      <select id="sortDropdown">
        <option value="date-asc">Sort by Date (Earliest)</option>
        <option value="date-desc">Sort by Date (Latest)</option>
        <option value="price-asc">Sort by Price (Lowest)</option>
        <option value="price-desc">Sort by Price (Highest)</option>
      </select>

      <button id="toggleSourceButton">Show Monthly Summaries</button>
      <div id="insightsControls" class="insights-controls" style="display: none;">
        <select id="insightMetricDropdown" title="Choose metric to rank months by">
          <option value="total">Total (Card Price)</option>
          <option value="purelyFood">Purely Food Expenses</option>
          <option value="breakfast">Breakfast</option>
          <option value="lunch">Lunch</option>
          <option value="dinner">Dinner</option>
          <option value="avgPerDay">Average Cost Per Day</option>
          <option value="etcExpenses">Etc. Expenses</option>
          <option value="rental">Rental</option>
          <option value="utilities">Utilities</option>
          <option value="petrol">Petrol</option>
          <option value="cashDamage">Cash Damage</option>
          <option value="totalDamage">Total Damage</option>
        </select>
        <button id="showInsightButton">Show Insight</button>
      </div>
      <button id="backHomeButton">Back to Home</button>
    </div>
    <span id="resultCount">0 results found</span>
  </div>
</div>

<!-- OUTER scroll area (goes full-width, scrollbar on far right) -->
<div id="scrollArea" class="page-scroll-area">

  <div class="container">
    <div class="menu">
      <h2 class="menu-group-heading">All Food Logs</h2>
      <div id="insightsPanel" class="insights-panel" style="display: none;"></div>

      <div id="menu-group" class="menu-group clusterize-content"></div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/clusterize.js@0.18.1/clusterize.min.js"></script>
<script src="full.js"></script>

</body>
</html>
